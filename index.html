<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow Up Planner</title>
    <style>
        /* Minimalist & Clean Aesthetics (Soft Warm Rose/Nude Theme) */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #fdf6f0;
            color: #4a3e3d;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #ffffff;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        h1 {
            text-align: center;
            font-family: 'Georgia', serif;
            color: #d4a373;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #a3b18a;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        .section {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px dashed #e9ecef;
        }
        h2 {
            font-size: 1.1rem;
            color: #b58282;
            margin-bottom: 15px;
        }
        /* Checklist Styling */
        .checklist-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }
        .checklist-item input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: #e0a96d;
            cursor: pointer;
        }
        /* Body Measurements Styling */
        .input-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .input-group label {
            font-size: 0.95rem;
        }
        .input-group input {
            width: 80px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 6px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GLOW UP PLANNER</h1>
    <div class="subtitle">Month 1 • Day 1 - 30</div>

    <!-- SECTION 1: DAILY CHECKLIST -->
    <div class="section">
        <h2>Daily Checklist</h2>
        <div class="checklist-item">
            <input type="checkbox" id="water" onchange="saveData()">
            <label for="water">💧 Drink 2.5 - 3L of water</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="protein" onchange="saveData()">
            <label for="protein">🥩 Eat 80-100g of protein</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="workout" onchange="saveData()">
            <label for="workout">🏋️ Scheduled workout complete</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="steps" onchange="saveData()">
            <label for="steps">👟 8,000 - 10,000 steps</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="skincare" onchange="saveData()">
            <label for="skincare">✨ Morning & Night skincare</label>
        </div>
        <div class="checklist-item">
            <input type="checkbox" id="sleep" onchange="saveData()">
            <label for="sleep">💤 Sleep 7.5 - 9 hours</label>
        </div>
    </div>

    <!-- SECTION 2: BODY MEASUREMENTS -->
    <div class="section">
        <h2>Body Measurements (Day 1)</h2>
        <div class="input-group">
            <label for="weight">Body Weight:</label>
            <div><input type="number" id="weight" oninput="saveData()"> kg</div>
        </div>
        <div class="input-group">
            <label for="waist">Waistline:</label>
            <div><input type="number" id="waist" oninput="saveData()"> cm</div>
        </div>
        <div class="input-group">
            <label for="hips">Hipline:</label>
            <div><input type="number" id="hips" oninput="saveData()"> cm</div>
        </div>
    </div>

    <p style="text-align: center; font-size: 0.8rem; color: #aaa; font-style: italic;">
        "Consistency is more important than perfection."
    </p>
</div>

<script>
    // Function to automatically save data to the browser's storage
    function saveData() {
        const data = {
            water: document.getElementById('water').checked,
            protein: document.getElementById('protein').checked,
            workout: document.getElementById('workout').checked,
            steps: document.getElementById('steps').checked,
            skincare: document.getElementById('skincare').checked,
            sleep: document.getElementById('sleep').checked,
            weight: document.getElementById('weight').value,
            waist: document.getElementById('waist').value,
            hips: document.getElementById('hips').value
        };
        localStorage.setItem('glowupDataEn', JSON.stringify(data));
    }

    // Function to reload the saved data when the website opens
    function loadData() {
        const savedData = localStorage.getItem('glowupDataEn');
        if (savedData) {
            const data = JSON.parse(savedData);
            document.getElementById('water').checked = data.water || false;
            document.getElementById('protein').checked = data.protein || false;
            document.getElementById('workout').checked = data.workout || false;
            document.getElementById('steps').checked = data.steps || false;
            document.getElementById('skincare').checked = data.skincare || false;
            document.getElementById('sleep').checked = data.sleep || false;
            document.getElementById('weight').value = data.weight || '';
            document.getElementById('waist').value = data.waist || '';
            document.getElementById('hips').value = data.hips || '';
        }
    }

    // Execute loadData whenever the web page loads
    window.onload = loadData;
</script>

</body>
</html>
